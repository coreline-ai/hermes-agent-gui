# 2-container mode: Hermes Agent gateway runs in its own container, GUI talks
# to it via HERMES_API_URL. Use this when you already maintain hermes-agent
# separately (e.g., a long-lived install you don't want the GUI to disturb).

services:
  agent:
    image: ghcr.io/nousresearch/hermes-agent:latest
    container_name: hermes-agent
    environment:
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_TOKEN:?set in .env}
    volumes:
      - ${HOME}/.hermes:/root/.hermes
    ports:
      - "127.0.0.1:8642:8642"
    restart: unless-stopped

  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-agent-gui
    depends_on:
      - agent
    environment:
      HERMES_GUI_PASSWORD: ${HERMES_GUI_PASSWORD:?set in .env}
      HERMES_API_URL: http://agent:8642
      HERMES_API_TOKEN: ${HERMES_API_TOKEN}
      HERMES_GUI_WORKSPACES: /workspace
    volumes:
      - ${HOME}/workspace:/workspace
      - hermes-gui-state:/home/hermes/.hermes-agent-gui
    ports:
      - "127.0.0.1:8800:8800"
    restart: unless-stopped

volumes:
  hermes-gui-state:
