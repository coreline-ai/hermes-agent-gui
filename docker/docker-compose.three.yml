# 3-container mode: agent + GUI + reverse proxy (Caddy). Caddy provides
# automatic HTTPS for Tailscale / public exposure.

services:
  agent:
    image: ghcr.io/nousresearch/hermes-agent:latest
    container_name: hermes-agent
    environment:
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_TOKEN:?set in .env}
    volumes:
      - ${HOME}/.hermes:/root/.hermes
    restart: unless-stopped

  gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-agent-gui
    depends_on:
      - agent
    environment:
      HERMES_GUI_PASSWORD: ${HERMES_GUI_PASSWORD:?set in .env}
      HERMES_API_URL: http://agent:8642
      HERMES_API_TOKEN: ${HERMES_API_TOKEN}
      HERMES_GUI_WORKSPACES: /workspace
    volumes:
      - ${HOME}/workspace:/workspace
      - hermes-gui-state:/home/hermes/.hermes-agent-gui
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    container_name: hermes-gui-proxy
    depends_on:
      - gui
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  hermes-gui-state:
  caddy-data:
  caddy-config:
