<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes Agent GUI — offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
      }
      .card {
        max-width: 360px;
        padding: 24px;
        text-align: center;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
      }
      h1 { font-size: 1.1rem; margin: 0 0 8px; }
      p  { font-size: 0.85rem; line-height: 1.5; opacity: 0.85; margin: 0 0 12px; }
      button {
        background: #0ea5e9; color: white; border: 0; border-radius: 8px;
        padding: 8px 14px; font-size: 0.85rem; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        hermes-agent-gui can't reach the backend right now. Cached UI is shown
        from your service worker; live data will resume when you're back online.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
