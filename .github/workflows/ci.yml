name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m pip install -r apps/server/requirements.txt pytest
      - run: python3 -m pytest -v apps/server

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm lint
      - run: pnpm --filter @hermes-agent-gui/web typecheck
      - run: pnpm --filter @hermes-agent-gui/web build

  docker-build:
    runs-on: ubuntu-latest
    needs: [server-tests, web-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f docker/Dockerfile -t hermes-agent-gui:ci .
      - name: smoke test
        run: |
          docker run -d --name gui -e HERMES_GUI_PASSWORD=ci -p 8800:8800 hermes-agent-gui:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8800/api/health >/tmp/health.json \
              && curl -fsSI http://127.0.0.1:8800/ | grep -qi "content-type: text/html"; then
              cat /tmp/health.json; echo " (ok)"; exit 0
            fi
            sleep 1
          done
          docker logs gui; exit 1
